#
# NYRO 主配置文件
#

# ============================================================
# Nginx 核心配置
# ============================================================
nginx:
  # Worker 进程配置
  worker_processes: auto
  worker_connections: 10620
  worker_rlimit_nofile: 20480
  worker_shutdown_timeout: 3

  # 日志配置
  error_log: logs/error.log
  access_log: logs/access.log

  # DNS 解析器
  resolver:
    - 8.8.8.8
    - 114.114.114.114
  resolver_ipv6: false

  # 请求体大小限制 (0 = 无限制)
  client_max_body_size: 0

  # 代理监听端口
  http_listen:
    - 10080
  https_listen:
    - 10443

  # SSL/TLS 说明:
  #   - 占位证书 (ssl_certificate) 由 nyro 启动时自动生成
  #   - 业务证书通过 conf/config.yaml 中的 certificates 动态管理
  #   - ssl_certificate_by_lua_block 在运行时按 SNI 匹配并设置证书

  # Lua 共享内存区配置
  shared_dict:
    nyro_config_version: 1m
    plugin_limit_conn: 50m
    plugin_limit_req: 50m
    plugin_limit_count: 50m
    plugin_local_metrics: 10m
    upstream_health_check: 10m
    upstream_worker_event: 10m
    worker_events: 10m

# ============================================================
# 存储模式配置
# ============================================================
store:
  mode: standalone

  standalone:
    # 声明式配置文件路径 (相对于 nginx prefix)
    config_file: conf/config.yaml

# ============================================================
# 插件模块加载列表 (声明要加载哪些插件 handler)
# ============================================================
plugins:
  - cors
  - mock
  - key-auth
  - jwt-auth
  - limit-req
  - limit-conn
  - limit-count
  - ai-proxy
  - local-metrics
  - local-logs

# ============================================================
# 日志配置
# ============================================================
logging:
  level: info       # debug | info | warn | error

# ============================================================
# Admin API 配置
# ============================================================
admin:
  enabled: true
  listen:
    - 11080
